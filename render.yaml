services:
  - type: web
    name: chessdb-backend
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    dockerBuildTarget: backend
    plan: free
    healthCheckPath: /api/health
    envVars:
      # --- Flask core ---
      - key: FLASK_ENV
        value: production
      - key: SECRET_KEY
        generateValue: true
      - key: JWT_SECRET_KEY
        generateValue: true

      # --- Stockfish (tuned for 512 MB free tier) ---
      - key: STOCKFISH_BASE_DIR
        value: /app/backend
      - key: ANALYSIS_DEPTH
        value: 18
      - key: ANALYSIS_THREADS
        value: 1
      - key: ANALYSIS_HASH
        value: 32
      - key: ANALYSIS_TIMEOUT
        value: 300

      # --- CORS + Frontend (set in Render Dashboard after Vercel deploy) ---
      - key: CORS_ORIGINS
        sync: false
      - key: FRONTEND_ORIGIN
        sync: false

      # --- Database (set in Render Dashboard after Neon setup) ---
      - key: DATABASE_URL
        sync: false
