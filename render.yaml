services:
  - type: web
    name: chessdb-backend
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    dockerBuildTarget: backend
    plan: free
    envVars:
      - key: FLASK_ENV
        value: production
      - key: SECRET_KEY
        generateValue: true
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: STOCKFISH_BASE_DIR
        value: /app/backend
      - key: ANALYSIS_DEPTH
        value: 20
      - key: ANALYSIS_THREADS
        value: 1
      - key: ANALYSIS_HASH
        value: 64
      - key: CORS_ORIGINS
        sync: false
      - key: DATABASE_URL
        sync: false
